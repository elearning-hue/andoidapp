name: Release APK

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# Builds the debug APK (debug-signed, so it installs by sideloading) and
# publishes it as a GitHub Release with the APK attached.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Name the APK after the tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cp app/build/outputs/apk/debug/app-debug.apk "gavthan-printer${TAG}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Gavthan ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: gavthan-printer*.apk
